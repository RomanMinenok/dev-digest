name: DevDigest review (general-reviewer)

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      DEVDIGEST_POST_AS: pr_comment
      DEVDIGEST_AGENT: general-reviewer
      DEVDIGEST_RESULT_PATH: devdigest-result-general-reviewer.json
    steps:
      - uses: actions/checkout@v4
      - name: Run DevDigest review
        run: node .devdigest/runner/index.js
      - name: Upload review result
        uses: actions/upload-artifact@v4
        with:
          name: devdigest-result-general-reviewer
          path: devdigest-result-general-reviewer.json
          if-no-files-found: error
